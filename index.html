function normalizar(txt) {
  return txt.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9\s]/g," ");
}

  resultEl.style.display = "block";

  var complementaresEncontrados = [];
  var principalEspecial = null;
  for (var i = 0; i < complementaresEspeciais.length; i++) {

    var todosPresentes = true;
    for (var g = 0; g < ce.gatilho.length; g++) {

    }
  }

  // Encontrar todos os códigos que batem

    for (var k = 0; k < r.palavras.length; k++) {
if ((" " + textoNorm + " ").includes(" " + normalizar(r.palavras[k]) + " ")) {        encontrados.push(r);
        break;
      }
    }
  }

 // 🔥 SE NÃO ACHOU NAS REGRAS, MAS ACHOU REGRA ESPECIAL
if (encontrados.length === 0 && principalEspecial) {
    for (var m = 0; m < regras.length; m++) {
        if (regras[m].codigo === principalEspecial) {

    }
}

// SE NÃO ACHOU NADA MESMO
if (encontrados.length === 0) {

  }

var active = "ALL";

function init() {
  var cats=[];
  for(var i=0;i<data.length;i++) if(cats.indexOf(data[i][0])===-1) cats.push(data[i][0]);
  var filtersEl=document.getElementById("filters");
  filtersEl.innerHTML="";
  var allChip=document.createElement("span");
  allChip.className="chip active";allChip.textContent="Todos";allChip.setAttribute("data-cat","ALL");
  allChip.onclick=function(){active="ALL";updateChips();render();};
  filtersEl.appendChild(allChip);
  for(var j=0;j<cats.length;j++){
    (function(cat){
      var label="";for(var k=0;k<data.length;k++){if(data[k][0]===cat){label=data[k][1];break;}}
      var chip=document.createElement("span");
      chip.className="chip";chip.textContent=cat+" — "+label;chip.setAttribute("data-cat",cat);
      chip.onclick=function(){active=cat;updateChips();render();};
      filtersEl.appendChild(chip);
    })(cats[j]);
  }
  render();
}

function updateChips(){
  var chips=document.querySelectorAll(".chip");
  for(var i=0;i<chips.length;i++) chips[i].className=chips[i].getAttribute("data-cat")===active?"chip active":"chip";
}

    var r=rows[j];
    html+="<tr><td><span class='badge badge-"+r[0]+"'>"+r[0]+"</span></td><td style='color:#666;font-size:12px;'>"+r[1]+"</td><td style='font-weight:700;'>"+r[2]+"</td><td>"+r[3]+"</td></tr>";
  }
  document.getElementById("tbody").innerHTML=html;
}

window.onload=init;
</script>
</body>
