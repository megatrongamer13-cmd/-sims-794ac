function normalizar(txt) {
  return txt.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9\s]/g, " ");
}

// Casa uma palavra-chave no texto normalizado, sempre no INICIO de uma palavra
// (permite plural/sufixo: "folgado" casa "folgados"), nunca embutida no meio de
// outra palavra: assim "sos" NAO casa dentro de "parafuSOS" nem "roca" dentro de "tROCA".
function casaPalavra(textoNorm, palavra) {
  var p = normalizar(palavra).trim();
  if (!p) return false;
  return new RegExp("(^|[^a-z0-9])" + p).test(textoNorm);
}

function getRegra(cod) {
  for (var i = 0; i < regras.length; i++) if (regras[i].codigo === cod) return regras[i];
  return null;
}

function identificar() {
  var texto = document.getElementById("ia-input").value.trim();
  if (!texto) {
    alert("Por favor, insira a descrição da falha.");
    return;
  }

  var textoNorm = normalizar(texto).replace(/\s+/g, " ");
  textoNorm = textoNorm.replace(/\bs\s+o\s+s\b/g, "sos");
  // "bracadeira" e "abracadeira" sao a mesma peca (ambas usadas no Brasil); as regras/gates
  // so conhecem "abracadeira", entao canonizamos no inicio da palavra (idempotente).
  textoNorm = textoNorm.replace(/\bbracadeira/g, "abracadeira");
  // So converte ferro/cobre->metal e "acima do especificado"->contaminacao em contexto de
  // oleo/SOS, para nao classificar peca de ferro ou pressao fora de spec como contaminacao.
  if (/(^|[^a-z])(sos|oleo|amostra|analise|lubrificante|graxa)/.test(textoNorm)) {
    textoNorm = textoNorm.replace(/\bferro\b|\bcobre\b/g, "metal");
  }
  // "acima do especificado" so vira contaminacao quando ha contexto de elemento/metal (analise SOS),
  // nao em "pressao/temperatura acima do especificado".
  if (/(^|[^a-z])(sos|amostra|elemento|metal|sodio|silicio|aluminio|cromo|limalha|particula)/.test(textoNorm)) {
    textoNorm = textoNorm.replace(/acima do especificado/g, "contaminacao");
  }

  var resultEl = document.getElementById("ia-result");
  resultEl.style.display = "block";

  // 1) matches genericos por palavra-chave
  var encontrados = [];
  for (var j = 0; j < regras.length; j++) {
    for (var k = 0; k < regras[j].palavras.length; k++) {
      if (casaPalavra(textoNorm, regras[j].palavras[k])) { encontrados.push(regras[j]); break; }
    }
  }

  // Sinais para o gate de FERRAGEM solta/faltante (P22): so dispara com substantivo de
  // ferragem E um sinal de falta/solta. Assim "falta de oleo"/"sem pressao" NAO viram P22.
  var temFerragem = /(^|[^a-z])(parafuso|porca|abracadeira|suporte|clipe|grampo|fixador|fixac|ferragem|arruela|prisioneiro|bujao|plug|tampa|coxim|presilha|braquete|taps|protetor|protecao|cap |pino|retentor|cupilha|contrapino|trava de|presilha|silencios|ponteir|escapament|exaust)/.test(textoNorm);
  var faltaOuSolta = /(^|[^a-z])(faltand|faltante|ausen|sem |nao instalad|nao possui|nao tem |solto|solta|folgad|frouxo|frouxa|mal apertad|nao apertad|torque baixo|sub torque|instalar|aplicar|recolocar|repor )/.test(textoNorm);

  var principal = null;
  var compsCurados = [];

  // 2) regras curadas (complementaresEspeciais): 1o gatilho cujos termos TODOS aparecem
  for (var e = 0; e < complementaresEspeciais.length; e++) {
    var ce = complementaresEspeciais[e], todos = true;
    for (var g = 0; g < ce.gatilho.length; g++) {
      if (!casaPalavra(textoNorm, ce.gatilho[g])) { todos = false; break; }
    }
    if (todos) { principal = getRegra(ce.principal); compsCurados = ce.complementares || []; break; }
  }

  // 3) ferragem solta/faltante -> P22
  if (!principal && temFerragem && faltaOuSolta) principal = getRegra("P22");

  // 4) SOS/contaminacao -> B62
  if (!principal && (textoNorm.includes("limalha") || casaPalavra(textoNorm, "sos") || textoNorm.includes("metal")) && (textoNorm.includes("contaminacao") || textoNorm.includes("particula"))) {
    principal = getRegra("B62");
  }

  // 5) cascata por prioridade entre os encontrados
  if (!principal) {
    for (var pr = 0; pr < prioridade.length && !principal; pr++) {
      for (var x = 0; x < encontrados.length; x++) {
        if (encontrados[x].codigo === prioridade[pr]) { principal = encontrados[x]; break; }
      }
    }
  }

  if (!principal) {
    resultEl.innerHTML = "<div class='nenhum'>⚠️ Nenhum código identificado automaticamente.</div>";
    return;
  }

  // complementares: curados primeiro, depois os encontrados ordenados por prioridade (sem o principal)
  var comps = [];
  function addComp(c, d) {
    if (c === principal.codigo) return;
    for (var i = 0; i < comps.length; i++) if (comps[i].c === c) return;
    comps.push({ c: c, d: d });
  }
  for (var cc = 0; cc < compsCurados.length; cc++) addComp(compsCurados[cc].c, compsCurados[cc].d);
  for (var pp = 0; pp < prioridade.length; pp++) {
    for (var y = 0; y < encontrados.length; y++) {
      if (encontrados[y].codigo === prioridade[pp]) addComp(encontrados[y].codigo, encontrados[y].desc);
    }
  }

  var html = "";
  html += "<div class='codigo-principal'><span>🔴 CÓDIGO PRINCIPAL: " + principal.codigo + " — " + principal.desc + "</span>" +
    "<button type='button' class='btn-copiar' onclick=\"copiarCodigo('" + principal.codigo + "', this)\">Copiar</button></div>";

  if (comps.length > 0) {
    html += "<div class='codigo-complementar'><strong>🟡 COMPLEMENTAR(ES):</strong><br>";
    for (var c = 0; c < comps.length; c++) {
      html += "• <strong>" + comps[c].c + "</strong> — " + comps[c].d + "<br>";
    }
    html += "</div>";
  }

  html += "<div class='dica'>💡 <strong>Dica:</strong> " + principal.dica + "</div>";
  resultEl.innerHTML = html;
}

// Copia SO o codigo (ex.: "G49") para a area de transferencia — sem emoji nem descricao.
function copiarCodigo(codigo, btn) {
  function feedback() {
    var orig = btn.getAttribute("data-orig") || btn.textContent;
    btn.setAttribute("data-orig", orig);
    btn.textContent = "Copiado!";
    btn.className = "btn-copiar copiado";
    setTimeout(function () { btn.textContent = orig; btn.className = "btn-copiar"; }, 1500);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(codigo).then(feedback, function () { copiarFallback(codigo, feedback); });
  } else {
    copiarFallback(codigo, feedback);
  }
}
// Fallback p/ navegador corporativo antigo ou contexto sem clipboard API.
function copiarFallback(texto, onOk) {
  var ta = document.createElement("textarea");
  ta.value = texto;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand("copy"); onOk(); } catch (e) {}
  document.body.removeChild(ta);
}

var active = "ALL";

function init() {
  var cats = [];
  for (var i = 0; i < data.length; i++) if (cats.indexOf(data[i][0]) === -1) cats.push(data[i][0]);
  var filtersEl = document.getElementById("filters");
  filtersEl.innerHTML = "";

  var allChip = document.createElement("span");
  allChip.className = "chip active";
  allChip.textContent = "Todos";
  allChip.setAttribute("data-cat", "ALL");
  allChip.onclick = function () { active = "ALL"; updateChips(); render(); };
  filtersEl.appendChild(allChip);

  for (var j = 0; j < cats.length; j++) {
    (function (cat) {
      var label = "";
      for (var k = 0; k < data.length; k++) { if (data[k][0] === cat) { label = data[k][1]; break; } }
      var chip = document.createElement("span");
      chip.className = "chip";
      chip.textContent = cat + " — " + label;
      chip.setAttribute("data-cat", cat);
      chip.onclick = function () { active = cat; updateChips(); render(); };
      filtersEl.appendChild(chip);
    })(cats[j]);
  }
  render();
}

function updateChips() {
  var chips = document.querySelectorAll(".chip");
  for (var i = 0; i < chips.length; i++) {
    chips[i].className = chips[i].getAttribute("data-cat") === active ? "chip active" : "chip";
  }
}

function render() {
  var q = document.getElementById("search").value.toLowerCase();
  var rows = [];
  for (var i = 0; i < data.length; i++) {
    var d = data[i];
    if ((active === "ALL" || d[0] === active) && (!q || (d[0] + d[1] + d[2] + d[3]).toLowerCase().indexOf(q) !== -1)) rows.push(d);
  }
  document.getElementById("count").textContent = rows.length + " código(s) encontrado(s)";
  var html = "";
  for (var j = 0; j < rows.length; j++) {
    var r = rows[j];
    html += "<tr><td><span class='badge badge-" + r[0] + "'>" + r[0] + "</span></td><td style='color:#666;font-size:12px;'>" + r[1] + "</td><td style='font-weight:700;'>" + r[2] + "</td><td>" + r[3] + "</td></tr>";
  }
  document.getElementById("tbody").innerHTML = html;
}

window.onload = init;
